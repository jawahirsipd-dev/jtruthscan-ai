<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Prompt Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 30px;
}

.box {
  max-width: 900px;
  margin: auto;
  background: rgba(30, 41, 59, 0.7);
  padding: 20px;
  border-radius: 15px;
}

h1 {
  text-align: center;
  color: #38bdf8;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
  margin-bottom: 15px;
}

textarea {
  width: 100%;
  height: 400px;
  background: #0b1220;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 10px;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="box">

<h1>🧠 TruthScan AI Prompt</h1>

<button onclick="copyText()">📋 Copy Prompt</button>

<textarea id="prompt">

You are a senior frontend developer.

Build a single-page HTML website called "TruthScan AI Pro".

FEATURES:
- Dark SaaS UI
- Glassmorphism design
- Chat input box
- Scan button
- AI emotional analysis output

OUTPUT MUST INCLUDE:
- Love %
- Sincerity %
- Honesty %
- Emotional clarity %
- Manipulation risk %

Use pattern-based logic (keywords, message length, tone).

Make it look like a viral AI tool for TikTok.

Return full working HTML only.

</textarea>

</div>

<script>
function copyText() {
  let text = document.getElementById("prompt");

  text.select();
  text.setSelectionRange(0, 99999);

  navigator.clipboard.writeText(text.value)
    .then(() => alert("Copied successfully 🔥"))
    .catch(() => alert("Copy failed — please select manually"));
}
</script>

</body>
</html>
