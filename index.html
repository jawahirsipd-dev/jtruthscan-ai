<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TruthScan AI Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #000);
  color: white;
  text-align: center;
  padding: 30px;
}

.glow {
  position: fixed;
  width: 500px;
  height: 500px;
  background: #38bdf8;
  filter: blur(180px);
  opacity: 0.12;
  top: -120px;
  left: -120px;
}

h1 {
  font-size: 44px;
  background: linear-gradient(90deg, #38bdf8, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

.card {
  max-width: 700px;
  margin: auto;
  background: rgba(30, 41, 59, 0.7);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(56,189,248,0.25);
}

textarea {
  width: 100%;
  height: 150px;
  border-radius: 12px;
  border: none;
  padding: 15px;
  font-size: 15px;
  background: #0b1220;
  color: white;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 13px 28px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #22c55e, #38bdf8);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px #38bdf8;
}

.result {
  margin-top: 20px;
  padding: 18px;
  background: rgba(15, 23, 42, 0.9);
  border-radius: 15px;
  text-align: left;
}

.badge {
  display: inline-block;
  padding: 5px 12px;
  background: #ef4444;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 10px;
}

.status {
  margin-top: 10px;
  opacity: 0.7;
}

.score {
  font-size: 22px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="glow"></div>

<h1>🧠 TruthScan AI Pro</h1>
<p style="opacity:0.8;">Advanced emotional + truth pattern analyzer</p>

<div class="badge">⚡ VIRAL AI TOOL</div>

<div class="card">

<textarea id="text" placeholder="Paste chat message..."></textarea>

<button onclick="analyze()">Run Deep Scan 🔍</button>

<p class="status" id="status"></p>

<div class="result" id="result">
Waiting for input...
</div>

<button onclick="copyLink()">📋 Copy & Share</button>

</div>

<script>

function analyze() {

  document.getElementById("status").innerText = "Deep AI scanning emotional patterns...";

  setTimeout(() => {

    let text = document.getElementById("text").value.toLowerCase();

    let score = 90;

    // STRONGER AI LOGIC (pattern + emotion)
    if (text.includes("sorry")) score -= 8;
    if (text.includes("busy")) score -= 12;
    if (text.includes("maybe")) score -= 10;
    if (text.includes("trust me")) score -= 22;
    if (text.includes("i swear")) score -= 25;
    if (text.includes("later")) score -= 10;
    if (text.includes("lol")) score -= 5;
    if (text.length < 10) score -= 15;

    let resultText = "";
    let insight = "";

    if (score > 75) {
      resultText = "Highly Genuine Message ✅";
      insight = "Emotionally stable communication detected.";
    } else if (score > 45) {
      resultText = "Mixed Signals 🤔";
      insight = "Possible emotional avoidance or unclear intent.";
    } else {
      resultText = "High Manipulation Risk 🚨";
      insight = "Strong signs of avoidance or dishonest framing.";
    }

    document.getElementById("result").innerHTML = `
      <div class="score">Truth Score: ${score}%</div>
      <p><b>Status:</b> ${resultText}</p>
      <p><b>AI Insight:</b> ${insight}</p>
      <p style="opacity:0.7;">Note: AI-based behavioral pattern estimation</p>
    `;

    document.getElementById("status").innerText = "Scan complete ✔";

  }, 1800);
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied! Share it 🔥");
}

</script>

</body>
</html>
