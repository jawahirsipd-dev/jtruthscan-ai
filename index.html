<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Master Prompt Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
}

h1 {
  text-align: center;
  color: #38bdf8;
}

textarea {
  width: 100%;
  height: 420px;
  border-radius: 10px;
  border: none;
  padding: 15px;
  font-size: 14px;
  outline: none;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.note {
  margin-top: 10px;
  font-size: 12px;
  opacity: 0.7;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>🧠 AI Master Prompt Tool</h1>

<textarea id="text">

You are a senior frontend developer and UI/UX designer.

Build a single-page website called "TruthScan AI Pro".

REQUIREMENTS:
- Dark modern SaaS UI
- Glassmorphism design
- Viral TikTok style UI
- Animated glowing background
- Mobile responsive layout

CORE FUNCTION:
User pastes chat message and clicks scan.

The system analyzes message using pattern-based logic and returns:

- Love Level (%)
- Sincerity (%)
- Honesty (%)
- Emotional Clarity (%)
- Manipulation Risk (%)

LOGIC RULES:
- Detect emotional words
- Detect avoidance words
- Detect defensive words
- Analyze message length
- Analyze uncertainty phrases

OUTPUT STYLE:
- AI psychological report
- Clear percentages
- Emotional interpretation
- Final conclusion

CONCLUSION TYPES:
- High love + honesty → genuine emotional intent
- Mixed signals → unclear emotional behavior
- Low scores → manipulation or emotional distance

FEATURES:
- scanning animation
- delayed result reveal
- copy/share button
- viral AI badge

Return ONLY full working HTML code.

</textarea>

<button onclick="copyText()">📋 Copy Prompt</button>

<div class="note">
If copy doesn’t work, manually select text and press Ctrl + C
</div>

</div>

<script>
function copyText() {
  let text = document.getElementById("text");

  // simple reliable copy method
  text.focus();
  text.select();
  document.execCommand("copy");

  alert("Prompt copied successfully 🔥");
}
</script>

</body>
</html>
