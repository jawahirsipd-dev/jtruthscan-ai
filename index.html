<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeCheck AI - 10 Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:30px;
  background:#111827;
}

/* NAV */
.nav{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:10px;
}

.nav button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

/* TOOL CARD */
.tool{
  max-width:800px;
  margin:20px auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
}

/* INPUT */
textarea,input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0b1220;
  color:white;
}

button.action{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#38bdf8;
  color:black;
  cursor:pointer;
}

.result{
  margin-top:10px;
  background:#0b1220;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
<h1>🧠 VibeCheck AI</h1>
<p>All-in-One AI Relationship Toolkit</p>
</div>

<div class="nav">
<button onclick="show('t1')">Message</button>
<button onclick="show('t2')">Love</button>
<button onclick="show('t3')">Emotion</button>
<button onclick="show('t4')">Red Flag</button>
<button onclick="show('t5')">Lie</button>
<button onclick="show('t6')">Reply</button>
<button onclick="show('t7')">Image</button>
<button onclick="show('t8')">Bio</button>
<button onclick="show('t9')">Pickup</button>
<button onclick="show('t10')">Personality</button>
</div>

<!-- TOOL 1 -->
<div id="t1" class="tool">
<h3>Message Analyzer</h3>
<textarea id="msg"></textarea>
<button class="action" onclick="analyzeMsg()">Analyze</button>
<div class="result" id="r1"></div>
</div>

<!-- TOOL 2 -->
<div id="t2" class="tool" style="display:none;">
<h3>Love Calculator</h3>
<input id="name1" placeholder="Name 1">
<input id="name2" placeholder="Name 2">
<button class="action" onclick="loveCalc()">Calculate</button>
<div class="result" id="r2"></div>
</div>

<!-- TOOL 3 -->
<div id="t3" class="tool" style="display:none;">
<h3>Emotion Detector</h3>
<textarea id="emo"></textarea>
<button class="action" onclick="emotion()">Detect</button>
<div class="result" id="r3"></div>
</div>

<!-- TOOL 4 -->
<div id="t4" class="tool" style="display:none;">
<h3>Red Flag Detector</h3>
<textarea id="rf"></textarea>
<button class="action" onclick="redFlag()">Check</button>
<div class="result" id="r4"></div>
</div>

<!-- TOOL 5 -->
<div id="t5" class="tool" style="display:none;">
<h3>Lie Detector</h3>
<textarea id="lie"></textarea>
<button class="action" onclick="lieCheck()">Analyze</button>
<div class="result" id="r5"></div>
</div>

<!-- TOOL 6 -->
<div id="t6" class="tool" style="display:none;">
<h3>Reply Generator</h3>
<textarea id="reply"></textarea>
<button class="action" onclick="replyGen()">Generate</button>
<div class="result" id="r6"></div>
</div>

<!-- TOOL 7 -->
<div id="t7" class="tool" style="display:none;">
<h3>Image Detector</h3>
<input type="file" id="img">
<button class="action" onclick="imgCheck()">Analyze</button>
<div class="result" id="r7"></div>
</div>

<!-- TOOL 8 -->
<div id="t8" class="tool" style="display:none;">
<h3>Bio Generator</h3>
<input id="bio">
<button class="action" onclick="bioGen()">Generate</button>
<div class="result" id="r8"></div>
</div>

<!-- TOOL 9 -->
<div id="t9" class="tool" style="display:none;">
<h3>Pickup Lines</h3>
<button class="action" onclick="pickup()">Generate</button>
<div class="result" id="r9"></div>
</div>

<!-- TOOL 10 -->
<div id="t10" class="tool" style="display:none;">
<h3>Personality Insight</h3>
<textarea id="pers"></textarea>
<button class="action" onclick="personality()">Analyze</button>
<div class="result" id="r10"></div>
</div>

<script>

/* NAVIGATION */
function show(id){
document.querySelectorAll(".tool").forEach(t=>t.style.display="none");
document.getElementById(id).style.display="block";
}

/* TOOL LOGIC */
function analyzeMsg(){
let t=msg.value.toLowerCase();
r1.innerText = t.includes("love") ? "Strong emotional interest detected." : "Mixed signals.";
}

function loveCalc(){
let score=Math.floor(Math.random()*100);
r2.innerText="Compatibility: "+score+"%";
}

function emotion(){
r3.innerText="Detected emotion: Neutral / Slightly Positive";
}

function redFlag(){
r4.innerText="Possible red flag detected.";
}

function lieCheck(){
r5.innerText="Statement shows inconsistencies.";
}

function replyGen(){
r6.innerText="You can reply: 'Sounds good, let's talk later.'";
}

function imgCheck(){
r7.innerText="Image appears AI-generated (demo logic).";
}

function bioGen(){
r8.innerText="Creative bio: Living life with purpose.";
}

function pickup(){
r9.innerText="Are you AI? Because you just analyzed my heart.";
}

function personality(){
r10.innerText="Personality: Thoughtful and observant.";
}

</script>

</body>
</html>
