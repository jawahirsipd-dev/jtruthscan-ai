<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TruthScan AI SaaS</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* LOGIN PAGE */
#loginPage, #appPage {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.container {
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:90%;
  max-width:400px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#0b1220;
  color:white;
}

button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  color:white;
  cursor:pointer;
}

/* DASHBOARD */
.header {
  padding:15px;
  background:#1e293b;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.card {
  max-width:800px;
  margin:20px auto;
  background:#1e293b;
  padding:20px;
  border-radius:12px;
}

textarea {
  width:100%;
  height:120px;
  background:#0b1220;
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
}

.result {
  margin-top:15px;
  background:#0b1220;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

.small {
  opacity:0.7;
  font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" style="display:flex;">
  <div class="container">
    <h2>🧠 TruthScan AI SaaS</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p class="small">Demo login system (no backend)</p>
  </div>
</div>

<!-- APP -->
<div id="appPage">

<div class="header">
  <div>🚀 TruthScan AI Pro</div>
  <button onclick="logout()">Logout</button>
</div>

<div class="card">

<h3>🧠 Emotional AI Analyzer</h3>

<textarea id="text" placeholder="Paste chat message..."></textarea>

<button onclick="analyze()">Scan Message</button>

<div class="result" id="result">Result will appear here...</div>

</div>

</div>

<script>

/* LOGIN SYSTEM */
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u && p){
    localStorage.setItem("user",u);
    showApp();
  } else {
    alert("Enter username & password");
  }
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function showApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("appPage").style.display="block";
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
  showApp();
}

/* AI ANALYZER */
function analyze(){

let text = document.getElementById("text").value.toLowerCase();

let love = 80;
let sincerity = 75;
let honesty = 85;
let clarity = 70;
let risk = 20;

const weak = ["maybe","idk","not sure"];
const avoid = ["busy","later","sleeping"];
const defend = ["trust me","i swear"];

weak.forEach(w=>{ if(text.includes(w)){ sincerity-=10; clarity-=10; }});
avoid.forEach(w=>{ if(text.includes(w)){ love-=12; }});
defend.forEach(w=>{ if(text.includes(w)){ risk+=15; honesty-=10; }});

love = Math.max(0,Math.min(100,love));
sincerity = Math.max(0,Math.min(100,sincerity));
honesty = Math.max(0,Math.min(100,honesty));
clarity = Math.max(0,Math.min(100,clarity));
risk = Math.max(0,Math.min(100,risk));

let final =
(love>75 && honesty>75)
? "❤️ Strong emotional connection detected"
: (sincerity>50)
? "🤔 Mixed emotional signals detected"
: "🚨 Emotional distance or manipulation risk detected";

document.getElementById("result").innerHTML = `
<h3>🧠 AI Report</h3>
<p>❤️ Love: ${love}%</p>
<p>💬 Sincerity: ${sincerity}%</p>
<p>🤝 Honesty: ${honesty}%</p>
<p>🧠 Clarity: ${clarity}%</p>
<p>⚠️ Risk: ${risk}%</p>
<hr>
<p><b>Conclusion:</b> ${final}</p>
<p class="small">SaaS Demo System (Frontend Only)</p>
`;

}

</script>

</body>
</html>
