<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Hub Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
}

.header{
text-align:center;
padding:50px 20px;
background:radial-gradient(circle,#0f172a,#020617);
}

.header h1{
font-size:50px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.search{
text-align:center;
padding:20px;
}

input{
width:60%;
padding:12px;
border-radius:10px;
border:none;
background:#111827;
color:white;
}

.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#22c55e,#38bdf8);
color:white;
cursor:pointer;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.result{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

.site{
margin-top:10px;
padding:10px;
background:#111827;
border-radius:8px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.1);
}

.site:hover{
background:#38bdf8;
color:black;
}

</style>
</head>

<body>

<div class="header">
<h1>🚀 Creator Hub Pro</h1>
<p>All AI tools in one place</p>
</div>

<!-- SEARCH -->
<div class="search">
<input placeholder="Search tools... (video, image, voice)">
</div>

<!-- BUTTONS -->
<div class="buttons">

<button onclick="show('video')">🎬 Video AI</button>
<button onclick="show('image')">🖼️ Image AI</button>
<button onclick="show('voice')">🎤 Voice AI</button>
<button onclick="show('seo')">📈 SEO Tools</button>
<button onclick="show('down')">⬇️ Downloader</button>

</div>

<!-- RESULT -->
<div class="container">
<div id="output" class="result">
👉 Select a tool to see 5 websites
</div>
</div>

<script>

function show(type){

let data = {

video:[
["PixVerse AI","https://pixverse.ai/"],
["Luma AI","https://lumalabs.ai/dream-machine"],
["Pika Labs","https://pika.art/"],
["Runway ML","https://runwayml.com/"],
["Hailuo AI","https://hailuoai.video/"]
],

image:[
["Leonardo AI","https://leonardo.ai/"],
["Mage Space","https://www.mage.space/"],
["Playground AI","https://playground.com/"],
["Ideogram AI","https://ideogram.ai/"],
["Bing Image Creator","https://www.bing.com/images/create"]
],

voice:[
["ElevenLabs","https://elevenlabs.io/"],
["PlayHT","https://play.ht/"],
["TTSMaker","https://ttsmaker.com/"],
["Narakeet","https://www.narakeet.com/"],
["FakeYou","https://fakeyou.com/"]
],

seo:[
["Ahrefs Keywords","https://ahrefs.com/keyword-generator"],
["Ubersuggest","https://neilpatel.com/ubersuggest/"],
["KeywordTool","https://keywordtool.io/"],
["Google Trends","https://trends.google.com/"],
["AnswerThePublic","https://answerthepublic.com/"]
],

down:[
["SS YouTube","https://ssyoutube.com/"],
["SnapTik","https://snaptik.app/"],
["SnapInsta","https://snapinsta.app/"],
["FDown","https://fdown.net/"],
["SaveFrom","https://savefrom.net/"]
]

};

let out = document.getElementById("output");

out.innerHTML = "";

data[type].forEach(site=>{

let div=document.createElement("div");
div.className="site";
div.innerHTML=site[0];

div.onclick=()=>{
window.open(site[1],"_blank");
}

out.appendChild(div);

});

}

</script>

</body>
</html>
