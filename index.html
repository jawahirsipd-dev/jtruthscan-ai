<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Hub Pro (5 AI Options)</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
}

.header{
text-align:center;
padding:60px 20px;
background:radial-gradient(circle,#0f172a,#020617);
}

.header h1{
font-size:50px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
margin-bottom:10px;
background:#111827;
color:white;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#22c55e,#38bdf8);
color:white;
font-weight:bold;
cursor:pointer;
}

.option{
margin-top:8px;
padding:10px;
border-radius:8px;
background:#0f172a;
cursor:pointer;
border:1px solid rgba(255,255,255,0.1);
transition:0.2s;
}

.option:hover{
background:#38bdf8;
color:black;
}

.result{
margin-top:10px;
font-size:13px;
white-space:pre-wrap;
opacity:0.9;
}

</style>
</head>

<body>

<div class="header">
<h1>🚀 Creator Hub Pro</h1>
<p>5 AI Options for Every Tool</p>
</div>

<div class="container">

<!-- VIDEO -->
<div class="card">
<h2>🎬 Video AI (5 Options)</h2>
<input id="videoInput" placeholder="Enter video idea">
<button onclick="videoAI()">Generate</button>

<div id="videoBox"></div>
<div class="result" id="videoResult"></div>
</div>

<!-- IMAGE -->
<div class="card">
<h2>🖼️ Image AI (5 Options)</h2>
<input id="imageInput" placeholder="Enter image idea">
<button onclick="imageAI()">Generate</button>

<div id="imageBox"></div>
<div class="result" id="imageResult"></div>
</div>

<!-- VOICE -->
<div class="card">
<h2>🎤 Voice AI (5 Options)</h2>
<input id="voiceInput" placeholder="Enter voice style">
<button onclick="voiceAI()">Generate</button>

<div id="voiceBox"></div>
<div class="result" id="voiceResult"></div>
</div>

</div>

<script>

function copy(t){
navigator.clipboard.writeText(t);
}

/* VIDEO AI */
function videoAI(){

let p=document.getElementById("videoInput").value;

let tools=[
["PixVerse AI","https://pixverse.ai/"],
["Luma Dream Machine","https://lumalabs.ai/dream-machine"],
["Hailuo AI","https://hailuoai.video/"],
["Pika Labs","https://pika.art/"],
["Runway ML","https://runwayml.com/"]
];

let box=document.getElementById("videoBox");
box.innerHTML="";

tools.forEach(t=>{
let d=document.createElement("div");
d.className="option";
d.innerText=t[0];

d.onclick=()=>{
copy(p);
document.getElementById("videoResult").innerText=
"Prompt copied for "+t[0];
window.open(t[1],"_blank");
};

box.appendChild(d);
});

}

/* IMAGE AI */
function imageAI(){

let p=document.getElementById("imageInput").value;

let tools=[
["Leonardo AI","https://leonardo.ai/"],
["Mage Space","https://www.mage.space/"],
["Playground AI","https://playground.com/"],
["Ideogram AI","https://ideogram.ai/"],
["Bing Image Creator","https://www.bing.com/images/create"]
];

let box=document.getElementById("imageBox");
box.innerHTML="";

tools.forEach(t=>{
let d=document.createElement("div");
d.className="option";
d.innerText=t[0];

d.onclick=()=>{
copy(p);
document.getElementById("imageResult").innerText=
"Prompt copied for "+t[0];
window.open(t[1],"_blank");
};

box.appendChild(d);
});

}

/* VOICE AI */
function voiceAI(){

let p=document.getElementById("voiceInput").value;

let tools=[
["ElevenLabs","https://elevenlabs.io/"],
["PlayHT","https://play.ht/"],
["TTSMaker","https://ttsmaker.com/"],
["Narakeet","https://www.narakeet.com/"],
["FakeYou","https://fakeyou.com/"]
];

let box=document.getElementById("voiceBox");
box.innerHTML="";

tools.forEach(t=>{
let d=document.createElement("div");
d.className="option";
d.innerText=t[0];

d.onclick=()=>{
copy(p);
document.getElementById("voiceResult").innerText=
"Voice prompt copied for "+t[0];
window.open(t[1],"_blank");
};

box.appendChild(d);
});

}

</script>

</body>
</html>
