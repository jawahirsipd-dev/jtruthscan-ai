<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeCheck AI - Truth Scorecard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px;
  background:linear-gradient(90deg,#0f172a,#1e293b);
}

.hero h1{
  font-size:42px;
  color:#38bdf8;
}

/* SCORECARD (NETFLIX STYLE) */
.card{
  max-width:800px;
  margin:20px auto;
  background:#111827;
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 20px rgba(56,189,248,0.2);
}

/* INPUT */
textarea{
  width:100%;
  height:120px;
  border:none;
  border-radius:10px;
  padding:12px;
  background:#0b1220;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  color:white;
  cursor:pointer;
}

/* SCORE GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.box{
  background:#0b1220;
  padding:15px;
  border-radius:10px;
  text-align:center;
  font-size:14px;
}

/* AI TEXT OUTPUT */
.ai-box{
  margin-top:15px;
  background:#0b1220;
  padding:15px;
  border-radius:10px;
  min-height:60px;
}

/* TYPING EFFECT */
.typing{
  display:inline-block;
  overflow:hidden;
  border-right:2px solid white;
  white-space:nowrap;
  animation:typing 2s steps(40,end), blink .7s infinite;
}

@keyframes typing{
  from{width:0}
  to{width:100%}
}

@keyframes blink{
  50%{border-color:transparent}
}

/* VIRAL SECTION */
.viral{
  text-align:center;
  padding:40px;
  opacity:0.8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>🧠 VibeCheck AI</h1>
  <p>Netflix-Style Relationship Truth Scorecard</p>
</div>

<div class="card">

<h2>💬 Paste Message</h2>

<textarea id="text"></textarea>

<button onclick="analyze()">Generate Truth Scorecard</button>

<div class="grid">
  <div class="box">❤️ Love<br><span id="love">--</span>%</div>
  <div class="box">💬 Sincerity<br><span id="sinc">--</span>%</div>
  <div class="box">🤝 Honesty<br><span id="hon">--</span>%</div>
  <div class="box">⚠️ Risk<br><span id="risk">--</span>%</div>
</div>

<div class="ai-box" id="aiBox">
AI insight will appear here...
</div>

</div>

<div class="viral">
🔥 TikTok-ready AI relationship analyzer | Share your results
</div>

<script>

function analyze(){

let text = document.getElementById("text").value.toLowerCase();

let love = 80;
let sincerity = 75;
let honesty = 85;
let risk = 20;

/* BASIC LOGIC */
if(text.includes("love")) love += 8;
if(text.includes("miss")) love += 5;
if(text.includes("busy")) sincerity -= 12;
if(text.includes("idk")) sincerity -= 10;
if(text.includes("trust")) risk += 10;

/* LIMIT */
love = Math.max(0,Math.min(100,love));
sincerity = Math.max(0,Math.min(100,sincerity));
honesty = Math.max(0,Math.min(100,honesty));
risk = Math.max(0,Math.min(100,risk));

/* UPDATE UI */
document.getElementById("love").innerText = love;
document.getElementById("sinc").innerText = sincerity;
document.getElementById("hon").innerText = honesty;
document.getElementById("risk").innerText = risk;

/* AI SENTENCE ENGINE */
let aiText = "";

if(love > 85 && sincerity > 80){
  aiText = "This message reflects strong emotional attachment and genuine intent. The communication shows honesty and care.";
}
else if(risk > 50){
  aiText = "This message shows emotional inconsistency and possible manipulation signals. Intent is unclear and unstable.";
}
else if(sincerity < 60){
  aiText = "This message appears emotionally distant with unclear commitment. The sender may be avoiding deeper emotional expression.";
}
else{
  aiText = "This message contains mixed emotional signals. The true intention cannot be confirmed with high confidence.";
}

/* TYPING ANIMATION */
document.getElementById("aiBox").innerHTML =
`<div class="typing">${aiText}</div>`;

}

</script>

</body>
</html>
