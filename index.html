<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeCheck AI - Analysis Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px;
  background:linear-gradient(90deg,#0f172a,#1e293b);
}

.header h1{
  font-size:38px;
  color:#38bdf8;
}

/* CARD */
.card{
  max-width:800px;
  margin:20px auto;
  background:#111827;
  border-radius:15px;
  padding:20px;
}

/* INPUT */
textarea{
  width:100%;
  height:120px;
  border:none;
  border-radius:10px;
  padding:12px;
  background:#0b1220;
  color:white;
}

input[type="file"]{
  width:100%;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  color:white;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.box{
  background:#0b1220;
  padding:15px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.box:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(56,189,248,0.4);
}

.icon{
  font-size:22px;
}

.value{
  font-size:18px;
  font-weight:bold;
}

/* RESULT */
.result{
  margin-top:15px;
  background:#0b1220;
  padding:15px;
  border-radius:10px;
  min-height:60px;
}

/* IMAGE */
img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
  display:none;
}

/* TYPING */
.typing{
  display:inline-block;
  overflow:hidden;
  border-right:2px solid white;
  white-space:nowrap;
  animation:typing 2s steps(40,end), blink .7s infinite;
}

@keyframes typing{
  from{width:0}
  to{width:100%}
}

@keyframes blink{
  50%{border-color:transparent}
}
</style>
</head>

<body>

<div class="header">
  <h1>🧠 VibeCheck AI</h1>
  <p>Advanced Message & Image Analysis</p>
</div>

<!-- MESSAGE TOOL -->
<div class="card">

<h2>Message Analysis</h2>

<textarea id="text" placeholder="Enter message..."></textarea>

<button onclick="analyzeText()">Analyze Message</button>

<div class="grid">

  <div class="box">
    <div class="icon">❤️</div>
    <div>Love</div>
    <div class="value" id="love">--%</div>
  </div>

  <div class="box">
    <div class="icon">💬</div>
    <div>Sincerity</div>
    <div class="value" id="sinc">--%</div>
  </div>

  <div class="box">
    <div class="icon">🤝</div>
    <div>Honesty</div>
    <div class="value" id="hon">--%</div>
  </div>

  <div class="box">
    <div class="icon">⚠️</div>
    <div>Risk</div>
    <div class="value" id="risk">--%</div>
  </div>

</div>

<div class="result" id="textResult">
Result will appear here...
</div>

</div>

<!-- IMAGE TOOL -->
<div class="card">

<h2>Image Analysis</h2>

<input type="file" id="imageInput" accept="image/*">

<img id="preview">

<button onclick="analyzeImage()">Analyze Image</button>

<div class="result" id="imgResult">
Upload an image to analyze...
</div>

</div>

<script>

/* IMAGE PREVIEW */
document.getElementById("imageInput").addEventListener("change", function(){
let file = this.files[0];
if(!file) return;

let reader = new FileReader();
reader.onload = function(e){
  let img = document.getElementById("preview");
  img.src = e.target.result;
  img.style.display = "block";
};
reader.readAsDataURL(file);
});

/* COLOR FUNCTION */
function colorScore(id, value){
let el = document.getElementById(id);
if(value > 80) el.style.color="#22c55e";
else if(value > 60) el.style.color="#38bdf8";
else el.style.color="#ef4444";
}

/* MESSAGE ANALYSIS */
function analyzeText(){

let text = document.getElementById("text").value.toLowerCase();

let love = 80;
let sincerity = 75;
let honesty = 85;
let risk = 20;

if(text.includes("love")||text.includes("miss")) love+=5;
if(text.includes("busy")) sincerity-=12;
if(text.includes("idk")||text.includes("maybe")) sincerity-=10;
if(text.includes("trust me")) risk+=15;

love=Math.max(0,Math.min(100,love));
sincerity=Math.max(0,Math.min(100,sincerity));
honesty=Math.max(0,Math.min(100,honesty));
risk=Math.max(0,Math.min(100,risk));

document.getElementById("love").innerText=love+"%";
document.getElementById("sinc").innerText=sincerity+"%";
document.getElementById("hon").innerText=honesty+"%";
document.getElementById("risk").innerText=risk+"%";

colorScore("love",love);
colorScore("sinc",sincerity);
colorScore("hon",honesty);
colorScore("risk",risk);

let report="";

if(love>85 && sincerity>80){
report="The message shows strong emotional connection and genuine intent.";
}
else if(risk>50){
report="The message indicates inconsistency or possible manipulation.";
}
else if(sincerity<60){
report="The message suggests emotional distance and low engagement.";
}
else{
report="The message contains mixed emotional signals.";
}

document.getElementById("textResult").innerHTML=
`<div class="typing">${report}</div>`;
}

/* IMAGE ANALYSIS */
function analyzeImage(){

let file=document.getElementById("imageInput").files[0];

if(!file){
alert("Upload image first");
return;
}

let score=50;

if(file.size<400000) score+=20;
if(file.type==="image/png") score+=10;
if(file.name.toLowerCase().includes("ai")) score+=15;

score=Math.min(100,score);

let msg="";

if(score>75){
msg="Image likely contains AI-generated patterns.";
}
else if(score>50){
msg="Image may be artificially enhanced.";
}
else{
msg="Image appears natural.";
}

document.getElementById("imgResult").innerHTML=`
<div class="typing">Processing image...</div>
<p>Confidence: ${score}%</p>
<p>${msg}</p>
`;

}

</script>

</body>
</html>
