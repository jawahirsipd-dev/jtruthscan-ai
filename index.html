<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TruthScan AI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  text-align: center;
  padding: 30px;
}

/* Glow background */
.glow {
  position: fixed;
  width: 400px;
  height: 400px;
  background: #38bdf8;
  filter: blur(150px);
  opacity: 0.15;
  top: -100px;
  left: -100px;
}

h1 {
  font-size: 42px;
  background: linear-gradient(90deg, #38bdf8, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tag {
  opacity: 0.8;
  margin-bottom: 20px;
}

.card {
  max-width: 650px;
  margin: auto;
  background: rgba(30, 41, 59, 0.7);
  padding: 25px;
  border-radius: 18px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(56,189,248,0.2);
}

textarea {
  width: 100%;
  height: 140px;
  border-radius: 12px;
  border: none;
  padding: 15px;
  background: #0b1220;
  color: white;
  font-size: 15px;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #38bdf8);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #38bdf8;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: rgba(15, 23, 42, 0.8);
  border-radius: 12px;
  text-align: left;
}

.status {
  margin-top: 10px;
  opacity: 0.7;
  font-size: 14px;
}

.badge {
  display: inline-block;
  padding: 5px 10px;
  background: #ef4444;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="glow"></div>

<h1>🧠 TruthScan AI</h1>
<p class="tag">Paste any chat and reveal hidden truth instantly 😳</p>

<div class="badge">⚡ VIRAL AI TOOL</div>

<div class="card">

  <textarea id="text" placeholder="Paste chat message here..."></textarea>

  <button onclick="analyze()">Scan Message 🔍</button>

  <p class="status" id="status"></p>

  <div class="result" id="result">
    Result will appear here...
  </div>

  <button onclick="copyLink()">📋 Copy & Share</button>

</div>

<script>

function analyze() {

  document.getElementById("status").innerText = "AI scanning message...";

  setTimeout(() => {

    let text = document.getElementById("text").value.toLowerCase();
    let score = 85;

    if (text.includes("sorry")) score -= 10;
    if (text.includes("busy")) score -= 15;
    if (text.includes("trust me")) score -= 20;
    if (text.includes("later")) score -= 10;
    if (text.includes("i swear")) score -= 25;

    let result = "";

    if (score > 70) result = "Likely Honest ✅";
    else if (score > 40) result = "Suspicious 🤔";
    else result = "High Chance of Dishonesty 🚩";

    document.getElementById("result").innerHTML = `
      <h3>Result</h3>
      <p><b>Truth Score:</b> ${score}%</p>
      <p><b>Status:</b> ${result}</p>
      <p style="opacity:0.7;">AI analysis based on message patterns</p>
    `;

    document.getElementById("status").innerText = "Scan complete ✔";

  }, 1500);
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied! Share it 🔥");
}

</script>

</body>
</html>
