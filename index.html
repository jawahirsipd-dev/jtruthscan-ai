<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeCheck AI - 3D Brain</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#000;
  color:white;
}

/* UI OVERLAY */
.ui {
  position:absolute;
  top:20px;
  left:20px;
  z-index:10;
  background:rgba(30,41,59,0.7);
  padding:15px;
  border-radius:12px;
  width:300px;
  backdrop-filter:blur(10px);
}

textarea {
  width:100%;
  height:80px;
  border:none;
  border-radius:8px;
  padding:8px;
  background:#0b1220;
  color:white;
}

button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  color:white;
  cursor:pointer;
}

.result {
  margin-top:10px;
  font-size:13px;
  opacity:0.9;
}

/* CANVAS FULL SCREEN */
canvas {
  display:block;
}
</style>
</head>

<body>

<div class="ui">
<h3>🧠 VibeCheck AI</h3>
<p style="font-size:12px;">3D Neural Brain System</p>

<textarea id="text" placeholder="Paste chat..."></textarea>
<button onclick="analyze()">Analyze</button>

<div class="result" id="result"></div>
</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// BRAIN STYLE OBJECT (SPHERE = REALISTIC AI BRAIN LOOK)
const geometry = new THREE.SphereGeometry(1.2, 64, 64);

const material = new THREE.MeshStandardMaterial({
  color: 0x38bdf8,
  emissive: 0x0ea5e9,
  wireframe: true
});

const brain = new THREE.Mesh(geometry, material);
scene.add(brain);

// LIGHTS
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

// ANIMATION LOOP
function animate(){
  requestAnimationFrame(animate);

  brain.rotation.y += 0.01;
  brain.rotation.x += 0.005;

  renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// AI LOGIC
function analyze(){

let text = document.getElementById("text").value.toLowerCase();

let love = 80;
let sincerity = 75;

if(text.includes("love")) love += 5;
if(text.includes("busy")) sincerity -= 10;
if(text.includes("idk")) sincerity -= 10;

// CHANGE BRAIN COLOR BASED ON SCORE
if(love > 85){
  brain.material.color.set(0x22c55e);
}
else if(love < 60){
  brain.material.color.set(0xef4444);
}
else {
  brain.material.color.set(0x38bdf8);
}

document.getElementById("result").innerHTML =
"❤️ Love: " + love + "%<br>💬 Sincerity: " + sincerity + "%<br>🧠 Neural scan complete";

}

</script>

</body>
</html>
