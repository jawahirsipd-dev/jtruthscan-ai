<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viral AI Creator Hub</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#050816;
color:white;
padding:20px;
}

h1{
text-align:center;
font-size:50px;
background:linear-gradient(90deg,#38bdf8,#22c55e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.container{
max-width:1000px;
margin:auto;
}

.box{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
}

textarea,input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

button{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#38bdf8);
color:white;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:15px;
padding:15px;
background:#0f172a;
border-radius:10px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 Viral AI Creator Hub</h1>

<!-- SEO TITLE -->
<div class="box">
<h2>📈 SEO Title Generator</h2>

<input type="text" id="seoInput" placeholder="Enter topic">

<button onclick="generateSEO()">Generate SEO Titles</button>

<div class="result" id="seoResult"></div>
</div>

<!-- DESCRIPTION -->
<div class="box">
<h2>✍️ Description Generator</h2>

<input type="text" id="descInput" placeholder="Enter video topic">

<button onclick="generateDesc()">Generate Description</button>

<div class="result" id="descResult"></div>
</div>

<!-- HASHTAGS -->
<div class="box">
<h2>#️⃣ Hashtag Generator</h2>

<input type="text" id="hashInput" placeholder="Enter topic">

<button onclick="generateHash()">Generate Hashtags</button>

<div class="result" id="hashResult"></div>
</div>

<!-- SCRIPT -->
<div class="box">
<h2>🧠 Script Generator</h2>

<input type="text" id="scriptInput" placeholder="Enter topic">

<button onclick="generateScript()">Generate Script</button>

<div class="result" id="scriptResult"></div>
</div>

<!-- MUSIC -->
<div class="box">
<h2>🎵 Free Music Search</h2>

<input type="text" id="musicInput" placeholder="Enter mood">

<button onclick="searchMusic()">Search Music</button>

<div class="result" id="musicResult"></div>
</div>

<!-- THUMBNAIL -->
<div class="box">
<h2>🔥 Thumbnail Prompt Generator</h2>

<input type="text" id="thumbInput" placeholder="Enter video topic">

<button onclick="generateThumb()">Generate Prompt</button>

<div class="result" id="thumbResult"></div>
</div>

<!-- IMAGE -->
<div class="box">
<h2>🖼️ AI Image Prompt</h2>

<input type="text" id="imageInput" placeholder="Enter image idea">

<button onclick="generateImage()">Generate Image Prompt</button>

<div class="result" id="imageResult"></div>
</div>

<!-- VIDEO IDEA -->
<div class="box">
<h2>🎬 Viral Video Idea</h2>

<input type="text" id="videoInput" placeholder="Enter niche">

<button onclick="generateVideo()">Generate Idea</button>

<div class="result" id="videoResult"></div>
</div>

</div>

<script>

function generateSEO(){

let topic=document.getElementById("seoInput").value;

document.getElementById("seoResult").innerText=
"🔥 "+topic+" EXPOSED 😱\\n"+
"Top 10 "+topic+" Secrets Nobody Knows\\n"+
"How "+topic+" Went Viral Overnight";
}

function generateDesc(){

let topic=document.getElementById("descInput").value;

document.getElementById("descResult").innerText=
"This video reveals everything about "+topic+
". Watch till the end for shocking details and viral moments.";
}

function generateHash(){

let topic=document.getElementById("hashInput").value;

document.getElementById("hashResult").innerText=
"#"+topic.replace(/ /g,"")+" #viral #fyp #trending #youtube #shorts #tiktok";
}

function generateScript(){

let topic=document.getElementById("scriptInput").value;

document.getElementById("scriptResult").innerText=
"HOOK: You won't believe this about "+topic+" 😳\\n\\n"+
"MAIN: Here is the shocking truth behind "+topic+
"...\\n\\nENDING: Follow for more viral stories!";
}

function searchMusic(){

let mood=document.getElementById("musicInput").value;

document.getElementById("musicResult").innerText=
"🎵 Recommended free music for "+mood+":\\n\\n"+
"- Cinematic Beat\\n"+
"- Emotional Trap\\n"+
"- Viral TikTok Sound";
}

function generateThumb(){

let topic=document.getElementById("thumbInput").value;

document.getElementById("thumbResult").innerText=
"Ultra realistic YouTube thumbnail about "+topic+
", dramatic lighting, shocked face, glowing text, viral style";
}

function generateImage(){

let idea=document.getElementById("imageInput").value;

document.getElementById("imageResult").innerText=
"Ultra realistic "+idea+
", cinematic lighting, 8k, detailed, trending AI art";
}

function generateVideo(){

let niche=document.getElementById("videoInput").value;

document.getElementById("videoResult").innerText=
"🎬 Viral video idea:\\n\\n"+
\"'I tested the craziest \"+niche+
\" trend and this happened 😳'\";
}

</script>

</body>
</html>
