<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeCheck AI - Animated</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #000);
  color:white;
  text-align:center;
  padding:20px;
  overflow-x:hidden;
}

/* BACKGROUND GLOW */
.glow {
  position:fixed;
  width:500px;
  height:500px;
  background:#38bdf8;
  filter:blur(180px);
  opacity:0.12;
  top:-120px;
  left:-120px;
}

/* ANIMATED LOGO */
.logo {
  width:90px;
  height:90px;
  margin:auto;
  background: radial-gradient(circle, #38bdf8, #1e293b);
  border-radius:50%;
  box-shadow:0 0 25px #38bdf8;
  animation: pulse 2s infinite ease-in-out;
  position:relative;
}

/* brain lines effect */
.logo::before {
  content:"🧠";
  font-size:40px;
  position:absolute;
  top:20px;
  left:25px;
}

/* PULSE ANIMATION */
@keyframes pulse {
  0% { transform: scale(1); box-shadow:0 0 20px #38bdf8; }
  50% { transform: scale(1.15); box-shadow:0 0 45px #22c55e; }
  100% { transform: scale(1); box-shadow:0 0 20px #38bdf8; }
}

/* TITLE */
h1 {
  margin-top:10px;
  font-size:40px;
  background:linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CHAT BOX */
.chat {
  max-width:700px;
  margin:20px auto;
  background:rgba(30,41,59,0.7);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(12px);
}

/* CHAT MESSAGE */
.message {
  background:#0b1220;
  padding:12px;
  border-radius:10px;
  text-align:left;
  margin-top:10px;
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}

/* INPUT */
textarea {
  width:100%;
  height:100px;
  border:none;
  border-radius:10px;
  padding:10px;
  background:#0b1220;
  color:white;
}

/* BUTTON */
button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  color:white;
  cursor:pointer;
}

/* TYPING EFFECT */
.typing {
  display:inline-block;
  overflow:hidden;
  border-right:2px solid white;
  white-space:nowrap;
  animation: typing 2s steps(30,end), blink .7s infinite;
}

@keyframes typing {
  from { width:0 }
  to { width:100% }
}

@keyframes blink {
  50% { border-color:transparent }
}
</style>
</head>

<body>

<div class="glow"></div>

<!-- ANIMATED LOGO -->
<div class="logo"></div>

<h1>VibeCheck AI</h1>
<p>🧠 Emotion & Chat Intelligence System</p>

<!-- CHAT AREA -->
<div class="chat">

<textarea id="text" placeholder="Paste chat message..."></textarea>

<button onclick="analyze()">Analyze Chat</button>

<div id="output"></div>

</div>

<script>

function analyze(){

let text = document.getElementById("text").value;

let love = 80;
let sincerity = 75;

if(text.includes("love")) love += 5;
if(text.includes("busy")) sincerity -= 10;

document.getElementById("output").innerHTML = `
<div class="message">
<div class="typing">🧠 AI analyzing message...</div>
</div>

<div class="message">
❤️ Love Score: ${love}%<br>
💬 Sincerity: ${sincerity}%
</div>

<div class="message">
🤖 Final AI Insight: Emotional pattern detected
</div>
`;

}

</script>

</body>
</html>
