<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TruthScan AI Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #000);
  color: white;
  text-align: center;
  padding: 25px;
}

.glow {
  position: fixed;
  width: 500px;
  height: 500px;
  background: #38bdf8;
  filter: blur(180px);
  opacity: 0.12;
  top: -120px;
  left: -120px;
}

h1 {
  font-size: 42px;
  background: linear-gradient(90deg, #38bdf8, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.card {
  max-width: 700px;
  margin: auto;
  margin-top: 20px;
  background: rgba(30, 41, 59, 0.7);
  padding: 25px;
  border-radius: 18px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 25px rgba(56,189,248,0.2);
}

textarea {
  width: 100%;
  height: 150px;
  border-radius: 12px;
  border: none;
  padding: 15px;
  font-size: 15px;
  background: #0b1220;
  color: white;
  outline: none;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #22c55e, #38bdf8);
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #38bdf8;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: rgba(15, 23, 42, 0.9);
  border-radius: 12px;
  text-align: left;
}

.status {
  margin-top: 10px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="glow"></div>

<h1>🧠 TruthScan AI Pro</h1>
<p style="opacity:0.8;">Emotional & Relationship Message Analyzer</p>

<div class="card">

<textarea id="text" placeholder="Paste chat message here..."></textarea>

<button onclick="analyze()">Scan Message 🔍</button>

<p class="status" id="status"></p>

<div class="result" id="result">
Result will appear here...
</div>

</div>

<script>

function analyze() {

let text = document.getElementById("text").value.toLowerCase();

// START VALUES
let love = 80;
let sincerity = 75;
let honesty = 85;
let clarity = 70;
let risk = 20;

// PATTERNS
const weak = ["maybe","not sure","idk","i guess","probably"];
const avoid = ["busy","later","talk later","sleeping"];
const defend = ["trust me","i swear","honestly","believe me"];
const cold = ["ok","k","lol","kk"];

weak.forEach(w => {
  if(text.includes(w)) {
    sincerity -= 10;
    clarity -= 10;
  }
});

avoid.forEach(w => {
  if(text.includes(w)) {
    love -= 12;
    sincerity -= 8;
  }
});

defend.forEach(w => {
  if(text.includes(w)) {
    risk += 15;
    honesty -= 10;
  }
});

cold.forEach(w => {
  if(text.includes(w)) {
    love -= 10;
    clarity -= 8;
  }
});

// LENGTH CHECK
if(text.length < 15) {
  sincerity -= 10;
  clarity -= 10;
}

if(text.split(" ").length < 4) {
  honesty -= 8;
}

// LIMIT RANGE
love = Math.max(0, Math.min(100, love));
sincerity = Math.max(0, Math.min(100, sincerity));
honesty = Math.max(0, Math.min(100, honesty));
clarity = Math.max(0, Math.min(100, clarity));
risk = Math.max(0, Math.min(100, risk));

// AI STATUS
let finalText = "";

if(honesty > 75 && love > 70){
  finalText = "❤️ Strong genuine emotional connection detected";
}
else if(sincerity > 50 && risk < 50){
  finalText = "🤔 Mixed emotional signals detected";
}
else{
  finalText = "🚨 High emotional inconsistency or distance detected";
}

// DISPLAY
document.getElementById("status").innerText = "AI scan complete ✔";

document.getElementById("result").innerHTML = `
<h3>🧠 Emotional Report</h3>

<p>❤️ Love Level: <b>${love}%</b></p>
<p>💬 Sincerity: <b>${sincerity}%</b></p>
<p>🤝 Honesty: <b>${honesty}%</b></p>
<p>🧠 Emotional Clarity: <b>${clarity}%</b></p>
<p>⚠️ Manipulation Risk: <b>${risk}%</b></p>

<hr>

<p><b>AI Conclusion:</b></p>
<p>${finalText}</p>

<p style="opacity:0.6;font-size:12px;">
AI-based pattern analysis (not guaranteed truth)
</p>
`;

}

</script>

</body>
</html>
