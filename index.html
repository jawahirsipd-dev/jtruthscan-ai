<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeCheck AI - Message & Image Analyzer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:40px 20px;
  background:linear-gradient(90deg,#0f172a,#1e293b);
}

.header h1{
  font-size:38px;
  color:#38bdf8;
}

/* MAIN CARD */
.card{
  max-width:800px;
  margin:20px auto;
  background:#111827;
  border-radius:15px;
  padding:20px;
}

/* INPUT */
textarea{
  width:100%;
  height:120px;
  border:none;
  border-radius:10px;
  padding:12px;
  background:#0b1220;
  color:white;
}

input[type="file"]{
  width:100%;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  color:white;
  cursor:pointer;
}

/* SCORE GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.box{
  background:#0b1220;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

/* RESULT BOX */
.result{
  margin-top:15px;
  background:#0b1220;
  padding:15px;
  border-radius:10px;
  min-height:60px;
}

/* IMAGE */
img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
  display:none;
}

/* TYPING EFFECT */
.typing{
  display:inline-block;
  overflow:hidden;
  border-right:2px solid white;
  white-space:nowrap;
  animation:typing 2s steps(40,end), blink .7s infinite;
}

@keyframes typing{
  from{width:0}
  to{width:100%}
}

@keyframes blink{
  50%{border-color:transparent}
}
</style>
</head>

<body>

<div class="header">
  <h1>🧠 VibeCheck AI</h1>
  <p>Advanced Message and Image Analysis Tool</p>
</div>

<!-- MESSAGE ANALYZER -->
<div class="card">

<h2>Message Analysis</h2>

<textarea id="text" placeholder="Enter or paste a message..."></textarea>

<button onclick="analyzeText()">Analyze Message</button>

<div class="grid">
  <div class="box">Love<br><span id="love">--</span>%</div>
  <div class="box">Sincerity<br><span id="sinc">--</span>%</div>
  <div class="box">Honesty<br><span id="hon">--</span>%</div>
  <div class="box">Risk<br><span id="risk">--</span>%</div>
</div>

<div class="result" id="textResult">
Analysis result will appear here...
</div>

</div>

<!-- IMAGE ANALYZER -->
<div class="card">

<h2>Image Analysis</h2>

<input type="file" id="imageInput" accept="image/*">

<img id="preview">

<button onclick="analyzeImage()">Analyze Image</button>

<div class="result" id="imgResult">
Upload an image to begin analysis...
</div>

</div>

<script>

/* IMAGE PREVIEW */
document.getElementById("imageInput").addEventListener("change", function(){

let file = this.files[0];
if(!file) return;

let reader = new FileReader();

reader.onload = function(e){
  let img = document.getElementById("preview");
  img.src = e.target.result;
  img.style.display = "block";
};

reader.readAsDataURL(file);

});

/* MESSAGE ANALYSIS */
function analyzeText(){

let text = document.getElementById("text").value.toLowerCase();

let love = 80;
let sincerity = 75;
let honesty = 85;
let risk = 20;

if(text.includes("love") || text.includes("miss")) love += 5;
if(text.includes("busy")) sincerity -= 12;
if(text.includes("idk") || text.includes("maybe")) sincerity -= 10;
if(text.includes("trust me")) risk += 15;

love = Math.max(0,Math.min(100,love));
sincerity = Math.max(0,Math.min(100,sincerity));
honesty = Math.max(0,Math.min(100,honesty));
risk = Math.max(0,Math.min(100,risk));

document.getElementById("love").innerText = love;
document.getElementById("sinc").innerText = sincerity;
document.getElementById("hon").innerText = honesty;
document.getElementById("risk").innerText = risk;

let report = "";

if(love > 85 && sincerity > 80){
  report = "The message reflects strong emotional connection and clear intent. The communication appears genuine and consistent.";
}
else if(risk > 50){
  report = "The message contains indicators of inconsistency or possible manipulation. Emotional clarity is limited.";
}
else if(sincerity < 60){
  report = "The message suggests emotional distance and a lack of openness. The sender may not be fully engaged.";
}
else{
  report = "The message presents mixed signals. A clear emotional conclusion cannot be determined with confidence.";
}

document.getElementById("textResult").innerHTML =
`<div class="typing">${report}</div>`;

}

/* IMAGE ANALYSIS */
function analyzeImage(){

let file = document.getElementById("imageInput").files[0];

if(!file){
  alert("Please upload an image");
  return;
}

let score = 50;

if(file.size < 400000) score += 20;
if(file.type === "image/png") score += 10;
if(file.name.toLowerCase().includes("ai")) score += 15;
if(file.name.toLowerCase().includes("generated")) score += 20;

score = Math.min(100, score);

let message = "";

if(score > 75){
  message = "The image shows strong characteristics commonly associated with AI-generated content.";
}
else if(score > 50){
  message = "The image may contain artificial enhancements or generated elements.";
}
else{
  message = "The image appears natural with no strong indicators of synthetic generation.";
}

document.getElementById("imgResult").innerHTML = `
<div class="typing">Processing image...</div>
<p style="margin-top:10px;">Confidence: ${score}%</p>
<p>${message}</p>
<p style="opacity:0.6;font-size:12px;">Analysis based on visual pattern estimation</p>
`;

}

</script>

</body>
</html>
